<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login | EduManage</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  body { min-height:100vh; background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 50%,#2563eb 100%); display:flex; align-items:center; justify-content:center; font-family:"Segoe UI",sans-serif; }
  .login-card { background:#fff; border-radius:20px; box-shadow:0 25px 50px rgba(0,0,0,.25); width:100%; max-width:440px; overflow:hidden; }
  .login-header { background:linear-gradient(135deg,#1e3a8a,#2563eb); padding:2.5rem 2rem; text-align:center; color:#fff; }
  .login-header .logo { font-size:3rem; margin-bottom:.5rem; }
  .login-body { padding:2rem; }
  .form-control { border-radius:10px; border:1.5px solid #e2e8f0; padding:.65rem 1rem; }
  .form-control:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.1); }
  .input-group-text { background:#f8fafc; border:1.5px solid #e2e8f0; }
  .btn-login { background:linear-gradient(135deg,#1e3a8a,#2563eb); border:none; border-radius:10px; padding:.75rem; font-weight:600; width:100%; color:#fff; transition:transform .2s; }
  .btn-login:hover { transform:translateY(-1px); color:#fff; }
  .hint-box { background:#f0f9ff; border:1px solid #bae6fd; border-radius:10px; padding:1rem; font-size:.8rem; color:#0369a1; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="logo"><i class="fas fa-graduation-cap"></i></div>
    <h1 style="font-size:1.6rem;font-weight:700;margin:0;">EduManage</h1>
    <p style="opacity:.8;margin:.25rem 0 0;font-size:.9rem;">Multi-Tenant School Management System</p>
  </div>
  <div class="login-body">
    {% for message in messages %}
    <div class="alert alert-danger py-2 mb-3" style="border-radius:10px;font-size:.875rem;border:none;">
      <i class="fas fa-exclamation-circle me-1"></i>{{ message }}
    </div>
    {% endfor %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-500" style="font-size:.88rem;">School Code</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-school text-muted"></i></span>
          <input type="text" name="school_code" class="form-control" placeholder="e.g. SCH001  (or ADMIN for Super Admin)">
        </div>
        <div class="form-text">Leave blank or type ADMIN for Super Admin login.</div>
      </div>
      <div class="mb-3">
        <label class="form-label" style="font-size:.88rem;font-weight:500;">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" style="font-size:.88rem;font-weight:500;">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control" id="pwd" placeholder="Enter your password" required>
          <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()"><i class="fas fa-eye" id="eye-icon"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-login btn"><i class="fas fa-sign-in-alt me-2"></i>Sign In</button>
    </form>
    <div class="hint-box mt-3">
      <strong><i class="fas fa-info-circle me-1"></i>Demo Credentials</strong><br>
      Super Admin: code <strong>ADMIN</strong>, user <strong>superadmin</strong> / pass <strong>admin123</strong>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>function togglePwd(){const p=document.getElementById("pwd"),i=document.getElementById("eye-icon");p.type==="password"?(p.type="text",i.className="fas fa-eye-slash"):(p.type="password",i.className="fas fa-eye");}</script>
</body>
</html>
