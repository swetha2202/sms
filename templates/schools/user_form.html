{% extends 'base.html' %}
{% block title %}Create User{% endblock %}
{% block page_title %}Create User{% endblock %}
{% block sidebar_nav %}
<a href="{% url 'dashboard' %}" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
<a href="{% url 'user_list' %}" class="nav-link"><i class="fas fa-users"></i> Users</a>
<a href="{% url 'user_create' %}" class="nav-link active"><i class="fas fa-user-plus"></i> Add User</a>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header py-3"><i class="fas fa-user-plus me-2 text-primary"></i>Create New User</div>
      <div class="card-body">
        <form method="post">{% csrf_token %}
          <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label">First Name</label><input type="text" name="first_name" class="form-control"></div>
            <div class="col-md-6 mb-3"><label class="form-label">Last Name</label><input type="text" name="last_name" class="form-control"></div>
          </div>
          <div class="mb-3"><label class="form-label">Username *</label><input type="text" name="username" class="form-control" required></div>
          <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
          <div class="mb-3"><label class="form-label">Password *</label><input type="password" name="password" class="form-control" required></div>
          <div class="mb-4"><label class="form-label">Role *</label>
            <select name="role" class="form-select" required>
              <option value="">Select role</option>
              <option value="teacher">Teacher</option>
              <option value="student">Student</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Create User</button>
            <a href="{% url 'user_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
